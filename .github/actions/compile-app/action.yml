name: "Compile App"
description: "Compiles the app on a SOAR instance"
inputs:
  current_phantom_ip:
    description: 'The IP address of the current Phantom version'
    required: true
  next_phantom_ip:
    description: 'The IP address of the next Phantom version'
    required: true
  previous_phantom_ip:
    description: 'The IP address of the previous Phantom version'
    required: true
  phantom_username:
    description: 'The username for the Phantom instances'
    required: true
  phantom_password:
    description: 'The password for the Phantom instances'
    required: true
  is_sdkfied:
    description: 'Whether this is an SDKfied app (true/false)'
    required: true
  uv_lock_directory:
    description: 'Directory containing uv.lock file (if SDKfied app)'
    required: false
runs:
  using: "composite"
  steps:
    - name: Install Requirements
      run: pip install -r ${{ github.action_path }}/requirements.txt
      shell: bash

    - name: Build and Install SDKfied App
      if: inputs.is_sdkfied == 'true'
      env:
        PHANTOM_PASSWORD: ${{ inputs.phantom_password }}
      run: |
        cd "${{ inputs.uv_lock_directory }}"
        echo "Building SDKfied app using soarapps CLI"
        uv run soarapps package build .
        echo "SDKfied app build completed successfully"

        TARBALL=$(find . -name "*.tgz" | head -1)
        TARBALL_NAME=$(basename "$TARBALL")
        TARBALL_ABS_PATH=$(readlink -f "$TARBALL")
        echo "Tarball created: $TARBALL_NAME"

        install_sdk_app() {
          local instance="$1"
          local attempt
          for attempt in 1 2 3; do
            if uv run soarapps package install "$TARBALL_NAME" "$instance" --username soar_local_admin; then
              return 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "SDKfied app installation failed on $instance after $attempt attempts"
              return 1
            fi
            echo "SDKfied app installation failed on $instance (attempt $attempt/3); retrying in $((attempt * 15)) seconds"
            sleep $((attempt * 15))
          done
        }

        echo "Checking version compatibility for current phantom instance (${{ inputs.current_phantom_ip }})"
        COMPATIBLE=$(python ${{ github.action_path }}/../../utils/version_compat.py "$TARBALL_ABS_PATH" "${{ inputs.current_phantom_ip }}" soar_local_admin "$PHANTOM_PASSWORD")
        if [ "$COMPATIBLE" == "true" ]; then
          echo "Installing app on current phantom instance (${{ inputs.current_phantom_ip }})"
          install_sdk_app "${{ inputs.current_phantom_ip }}"
        else
          echo "Skipping install on current phantom instance (${{ inputs.current_phantom_ip }}): app's min_phantom_version is not supported by this instance"
        fi

        echo "Checking version compatibility for next phantom instance (${{ inputs.next_phantom_ip }})"
        COMPATIBLE=$(python ${{ github.action_path }}/../../utils/version_compat.py "$TARBALL_ABS_PATH" "${{ inputs.next_phantom_ip }}" soar_local_admin "$PHANTOM_PASSWORD")
        if [ "$COMPATIBLE" == "true" ]; then
          echo "Installing app on next phantom instance (${{ inputs.next_phantom_ip }})"
          install_sdk_app "${{ inputs.next_phantom_ip }}"
        else
          echo "Skipping install on next phantom instance (${{ inputs.next_phantom_ip }}): app's min_phantom_version is not supported by this instance"
        fi

        echo "Checking version compatibility for previous phantom instance (${{ inputs.previous_phantom_ip }})"
        COMPATIBLE=$(python ${{ github.action_path }}/../../utils/version_compat.py "$TARBALL_ABS_PATH" "${{ inputs.previous_phantom_ip }}" soar_local_admin "$PHANTOM_PASSWORD")
        if [ "$COMPATIBLE" == "true" ]; then
          echo "Installing app on previous phantom instance (${{ inputs.previous_phantom_ip }})"
          install_sdk_app "${{ inputs.previous_phantom_ip }}"
        else
          echo "Skipping install on previous phantom instance (${{ inputs.previous_phantom_ip }}): app's min_phantom_version is not supported by this instance"
        fi

        echo "SDKfied app installation completed on all instances"
      shell: bash

    - name: Compile Traditional App
      if: inputs.is_sdkfied == 'false'
      env:
        PHANTOM_PASSWORD: ${{ inputs.phantom_password }}
      run: |
        set -e
        python ${{ github.action_path }}/compile_app_in_instance.py ${{ github.event.repository.name }} --app-repo-branch ${{ github.head_ref }} --current-phantom-ip ${{ inputs.current_phantom_ip }} --next-phantom-ip ${{ inputs.next_phantom_ip }} --previous-phantom-ip ${{ inputs.previous_phantom_ip }} --phantom-username ${{ inputs.phantom_username }}
      shell: bash
