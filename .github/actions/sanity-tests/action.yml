name: "Sanity Tests"
description: "Runs sanity tests on the app"
inputs:
  phantom_ip:
    description: "Phantom instance the tests are ran on"
    required: true
  version:
    description: "Phantom version being tested"
    required: true
  app_repo:
    description: "Connector repo being tested"
    required: true
  automation_broker:
    description: "Automation broker to use for cloud tests"
    required: false
  automation_broker_next:
    description: "Automation broker to use for next cloud tests"
    required: false
runs:
  using: "composite"
  steps:
    - name: Clone necessary repositories
      shell: bash
      run: |
        cd ..
        if [ ! -d "app-tests" ]; then
          git clone https://oauth2:$GITLAB_API_TOKEN@cd.splunkdev.com/phantom-apps/app-tests.git
        else
          echo "Repository 'app-tests' already exists. Skipping clone."
        fi
    - name: Run app tests
      env:
        APP_TESTS_BRANCH: ${{ github.head_ref || github.ref_name }}
      shell: bash
      run: |
        phantom_ip=${{ inputs.phantom_ip }}
        export PHANTOM_URL="https://$phantom_ip"
        python ${{ github.action_path }}/../../utils/app_rest_installer.py ${{ inputs.app_repo }}.tgz $phantom_ip $PHANTOM_USERNAME $PHANTOM_PASSWORD
        cd ../app-tests
        if ! git checkout origin/$APP_TESTS_BRANCH &> /dev/null; then
          echo "Could not find app-tests branch $APP_TESTS_BRANCH, defaulting to main."
          git checkout main
        fi
        if [[ "${{ inputs.version }}" == "cloud" ]]; then
          if [[ "${{ inputs.automation_broker }}" == "" ]]; then
            echo "ERROR - automation_broker is required for cloud!"
            exit 1
          fi
          export AUTOMATION_BROKER="${{ inputs.automation_broker }}"
          echo "Tests will use automation broker $AUTOMATION_BROKER"
        fi
        if [[ "${{ inputs.version }}" == "cloud_next" ]]; then
          if [[ "${{ inputs.automation_broker_next }}" == "" ]]; then
            echo "ERROR - automation_broker is required for cloud!"
            exit 1
          fi
          export AUTOMATION_BROKER="${{ inputs.automation_broker_next }}"
          echo "Tests will use automation broker $AUTOMATION_BROKER"
        fi
        if ! vault login -method=aws role=$VAULT_ROLE &> /dev/null; then
          echo "Failed to authenticate with Vault!"
          exit 1
        fi
        if [[ ! -d suite/apps/"${{ inputs.app_repo }}" ]]; then
          echo "ERROR - expected to find test suite for Splunk supported app ${{ inputs.app_repo }}"
          exit 1
        fi
        # Create results directory and run pytest with output capture
        mkdir -p "${{ github.workspace }}/test-results"
        echo "Running tests and capturing output to ${{ github.workspace }}/test-results/pytest-output-raw.log"
        # For AWS apps, use certification-style test filtering to exclude long-running playbook tests
        # Keeps _000 tests (base sanity tests), excludes _001-_016 (playbook tests)
        if [[ "${{ inputs.app_repo }}" == *"aws"* ]]; then
          echo "AWS app detected - applying test name filtering to exclude playbook tests (_001 through _016)"
          pytest suite/apps/"${{ inputs.app_repo }}" -m "not ui and sanity" -k "(test_connectivity or test_action) and not bad_asset and not (_001 or _002 or _003 or _004 or _005 or _006 or _007 or _008 or _009 or _010 or _011 or _012 or _013 or _014 or _015 or _016)" --verbose --reruns=$NUM_TEST_RETRIES --tb=native --color=yes | tee "${{ github.workspace }}/test-results/pytest-output-raw.log"
        else
          pytest suite/apps/"${{ inputs.app_repo }}" -m "not ui and sanity" --verbose --reruns=$NUM_TEST_RETRIES --tb=native --color=yes | tee "${{ github.workspace }}/test-results/pytest-output-raw.log"
        fi
        # Capture the pytest exit code from the pipeline
        PYTEST_EXIT_CODE=${PIPESTATUS[0]}
        echo "Test output saved to ${{ github.workspace }}/test-results/pytest-output-raw.log (exit code: $PYTEST_EXIT_CODE)"
        exit $PYTEST_EXIT_CODE
